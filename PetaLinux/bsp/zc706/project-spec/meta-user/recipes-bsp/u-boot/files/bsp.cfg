CONFIG_SYS_CONFIG_NAME="platform-top"
CONFIG_BOOT_SCRIPT_OFFSET=0x9C0000

# Board has no NAND and no flash-backed env. Keep these off so 2025.01 u-boot
# doesn't probe non-existent storage.
# CONFIG_CMD_NAND is not set
# CONFIG_MTD_RAW_NAND is not set
# CONFIG_NAND_ZYNQ is not set
# CONFIG_CMD_ONENAND is not set
# CONFIG_ONENAND is not set
CONFIG_ENV_IS_NOWHERE=y
# CONFIG_ENV_IS_IN_SPI_FLASH is not set
# CONFIG_ENV_IS_IN_NAND is not set
# CONFIG_ENV_IS_IN_FAT is not set
