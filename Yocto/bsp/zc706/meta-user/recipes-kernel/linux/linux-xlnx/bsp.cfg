# FPGA Drive FMC configs (Zynq-7000: AXI PCIe Gen2 Root Port in PL)

CONFIG_PCI=y
CONFIG_PCIEPORTBUS=y
CONFIG_PCI_REALLOC_ENABLE_AUTO=y
CONFIG_PCIE_XILINX=y
CONFIG_NVME_CORE=y
CONFIG_BLK_DEV_NVME=y

# All axi_pcie designs on 32-bit Zynq-7000 need a larger VMALLOC region to
# ioremap the PCIe bridge's ECAM / "CTL" config window (256 MB here). The
# default 3G/1G split leaves only ~240 MB of vmalloc, so the xilinx-pcie probe
# fails ("ioremap failed for resource [mem 0x40000000-0x4fffffff] ... Parsing
# DT failed ... error -12") and no SSDs enumerate. Move the user/kernel split
# to 2G/2G (PAGE_OFFSET 0x80000000) to make room. Mirrors the PetaLinux BSP.
CONFIG_ARCH_MMAP_RND_BITS_MAX=15
# CONFIG_VMSPLIT_3G is not set
CONFIG_VMSPLIT_2G=y
CONFIG_PAGE_OFFSET=0x80000000
