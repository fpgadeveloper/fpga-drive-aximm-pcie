# Override the EDF default bootcmd. Stock EDF sets CONFIG_BOOTCOMMAND="bootmenu -e"
# (bootcmd-bootefi.cfg / edf-env.cfg), which only offers EFI bootflows and never
# scans for a boot.scr -- and the EDF systemd-boot/EFI install is incomplete in
# 2025.2, so it dead-ends at the U-Boot prompt. Point the default bootcmd at our
# boot.scr on the esp instead. (meta-user layer priority 7 > meta-amd-edf 5, so
# this fragment merges last and wins.)
CONFIG_BOOTCOMMAND="load mmc 0:1 ${scriptaddr} boot.scr && source ${scriptaddr}"
